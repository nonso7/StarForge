<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarForge Template Registry</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: #0f0f1e;
        color: #e0e0ff;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      header {
        margin-bottom: 40px;
        text-align: center;
      }
      h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        color: #fff;
      }
      .tagline {
        color: #888;
        font-size: 1.1em;
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
      }
      input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #444;
        background: #1a1a2e;
        color: #fff;
        border-radius: 4px;
      }
      button {
        padding: 12px 24px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #7c7cff;
      }
      .templates-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
      }
      .template-card {
        background: #1a1a2e;
        border: 1px solid #333;
        padding: 20px;
        border-radius: 8px;
        transition: all 0.3s;
      }
      .template-card:hover {
        border-color: #6366f1;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
      }
      .template-name {
        font-size: 1.3em;
        font-weight: 600;
        margin-bottom: 8px;
        color: #fff;
      }
      .template-version {
        color: #888;
        font-size: 0.9em;
        margin-bottom: 8px;
      }
      .template-description {
        color: #b0b0cc;
        margin-bottom: 12px;
        font-size: 0.95em;
      }
      .template-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.85em;
        color: #777;
        margin-bottom: 12px;
      }
      .template-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .tag {
        background: #2a2a40;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 0.8em;
      }
      .rating {
        color: #ffc107;
      }
      .verified {
        background: #22c55e;
        color: white;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.75em;
      }
      .loading {
        text-align: center;
        color: #888;
        padding: 40px;
      }
      .empty {
        text-align: center;
        color: #888;
        padding: 40px;
      }
      .auth-section {
        margin-bottom: 30px;
        padding: 20px;
        background: #1a1a2e;
        border-radius: 8px;
      }
      .auth-link {
        color: #6366f1;
        cursor: pointer;
        text-decoration: underline;
      }
      .user-info {
        color: #22c55e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>⭐ StarForge Template Registry</h1>
        <p class="tagline">Discover and share Soroban contract templates</p>
      </header>

      <div class="auth-section">
        <div id="auth-status">Loading...</div>
      </div>

      <div class="search-box">
        <input
          type="text"
          id="search-input"
          placeholder="Search templates by name, tag, or description..."
        />
        <button onclick="search()">Search</button>
      </div>

      <div id="results">
        <div class="loading">Loading templates...</div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3000/api";

      async function checkAuth() {
        const token = localStorage.getItem("registry_token");
        const statusEl = document.getElementById("auth-status");

        if (token) {
          const username = localStorage.getItem("registry_username");
          statusEl.innerHTML = `<div class="user-info">✓ Logged in as <strong>${username}</strong> | <a class="auth-link" onclick="logout()">Logout</a></div>`;
        } else {
          statusEl.innerHTML = `<div>Not logged in | <a class="auth-link" onclick="openLoginModal()">Login</a> / <a class="auth-link" onclick="openSignupModal()">Signup</a></div>`;
        }
      }

      async function search() {
        const query = document.getElementById("search-input").value;
        const resultsEl = document.getElementById("results");
        resultsEl.innerHTML = '<div class="loading">Searching...</div>';

        try {
          const token = localStorage.getItem("registry_token");
          const headers = { "Content-Type": "application/json" };
          if (token) {
            headers["Authorization"] = `Bearer ${token}`;
          }

          const res = await fetch(`${API_URL}/templates/search`, {
            method: "POST",
            headers,
            body: JSON.stringify({ query, limit: 50 }),
          });

          const data = await res.json();

          if (!data.results || data.results.length === 0) {
            resultsEl.innerHTML = '<div class="empty">No templates found</div>';
            return;
          }

          const html = data.results
            .map(
              (tpl) => `
          <div class="template-card">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
              <div>
                <div class="template-name">${tpl.name}</div>
                <div class="template-version">v${tpl.version}</div>
              </div>
              ${tpl.verified ? '<div class="verified">VERIFIED</div>' : ""}
            </div>
            <div class="template-description">${tpl.description}</div>
            <div class="template-meta">
              <span>by ${tpl.author}</span>
              <span class="rating">⭐ ${tpl.ratings.average_rating.toFixed(1)} (${tpl.ratings.review_count})</span>
              <span>↓ ${tpl.downloads}</span>
            </div>
            <div class="template-tags">
              ${tpl.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
            </div>
            <button onclick="downloadTemplate('${tpl.name}', '${tpl.version}')" style="width: 100%;">Install</button>
          </div>
        `,
            )
            .join("");

          resultsEl.innerHTML = `<div class="templates-grid">${html}</div>`;
        } catch (err) {
          resultsEl.innerHTML = `<div class="empty">Error loading templates: ${err.message}</div>`;
        }
      }

      async function downloadTemplate(name, version) {
        const token = localStorage.getItem("registry_token");
        if (!token) {
          alert("Please login first to download templates");
          openLoginModal();
          return;
        }

        alert(
          `Download template ${name}@${version} - Copy this command to your CLI:\nstarforge registry install ${name} --version ${version}`,
        );
      }

      function openLoginModal() {
        const email = prompt("Email:");
        if (!email) return;
        const password = prompt("Password:");
        if (!password) return;

        login(email, password);
      }

      function openSignupModal() {
        const email = prompt("Email:");
        if (!email) return;
        const username = prompt("Username:");
        if (!username) return;
        const password = prompt("Password:");
        if (!password) return;

        signup(email, username, password);
      }

      async function login(email, password) {
        try {
          const res = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (data.success) {
            localStorage.setItem("registry_token", data.token);
            localStorage.setItem("registry_username", data.username);
            alert("Logged in successfully!");
            checkAuth();
          } else {
            alert("Login failed: " + data.error);
          }
        } catch (err) {
          alert("Error: " + err.message);
        }
      }

      async function signup(email, username, password) {
        try {
          const res = await fetch(`${API_URL}/auth/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, username, password }),
          });

          const data = await res.json();

          if (data.success) {
            localStorage.setItem("registry_token", data.token);
            localStorage.setItem("registry_username", data.username);
            alert("Account created successfully!");
            checkAuth();
          } else {
            alert("Signup failed: " + data.error);
          }
        } catch (err) {
          alert("Error: " + err.message);
        }
      }

      function logout() {
        localStorage.removeItem("registry_token");
        localStorage.removeItem("registry_username");
        alert("Logged out");
        checkAuth();
      }

      // Initial load
      checkAuth();
      search();
    </script>
  </body>
</html>
