name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked
      - name: Clippy
        run: cargo clippy --locked -- -D warnings

