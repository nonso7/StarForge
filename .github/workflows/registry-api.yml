name: Registry API CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "registry-api/**"
      - ".github/workflows/registry-api.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "registry-api/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'&quot;
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: registry-api/package-lock.json

      - name: Install dependencies
        working-directory: registry-api
        run: npm ci

      - name: Run linter
        working-directory: registry-api
        run: npm run lint

      - name: Build
        working-directory: registry-api
        run: npm run build

      - name: Run tests
        working-directory: registry-api
        env:
          MONGODB_URI: mongodb://localhost:27017/starforge-test
          JWT_SECRET: test-secret
        run: npm test

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./registry-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/starforge-registry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
